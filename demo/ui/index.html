<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber UEBA — Behavioral Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        /* Navigation */
        nav {
            background: #0f3460;
            border-bottom: 1px solid #1a5276;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 60px;
        }
        nav .brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00d4ff;
            margin-right: 3rem;
            letter-spacing: 0.5px;
        }
        nav .brand span { color: #4ade80; }
        nav a {
            color: #a0aec0;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active {
            color: #fff;
            background: rgba(0, 212, 255, 0.1);
        }
        nav a.active { border-bottom: 2px solid #00d4ff; }

        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

        /* Stat Cards */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #16213e;
            border: 1px solid #1a5276;
            border-radius: 8px;
            padding: 1.2rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4ff;
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: #7f8c9b;
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card.critical .value { color: #ef4444; }
        .stat-card.high .value { color: #f97316; }
        .stat-card.medium .value { color: #eab308; }
        .stat-card.low .value { color: #3b82f6; }

        /* Section Headers */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1a5276;
        }

        /* Charts */
        .chart-container {
            background: #16213e;
            border: 1px solid #1a5276;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .chart-container canvas { max-height: 300px; }

        /* Alerts Table */
        .table-container {
            background: #16213e;
            border: 1px solid #1a5276;
            border-radius: 8px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #0f3460;
            padding: 0.8rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7f8c9b;
        }
        td {
            padding: 0.7rem 1rem;
            border-top: 1px solid #1a5276;
            font-size: 0.9rem;
        }
        tr:hover { background: rgba(0, 212, 255, 0.03); }

        /* Severity Badges */
        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-critical { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .badge-high { background: rgba(249, 115, 22, 0.2); color: #f97316; border: 1px solid #f97316; }
        .badge-medium { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid #eab308; }
        .badge-low { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid #3b82f6; }

        .entity-link {
            color: #00d4ff;
            text-decoration: none;
            cursor: pointer;
        }
        .entity-link:hover { text-decoration: underline; }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #7f8c9b;
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 1rem;
            color: #ef4444;
            margin: 1rem 0;
        }

        /* Two-column layout */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 900px) {
            .two-col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="brand">Cyber UEBA <span>| Behavioral Intelligence</span></div>
        <a href="index.html" class="active">Dashboard</a>
        <a href="entity_detail.html">Entities</a>
        <a href="alerts.html">Alerts</a>
        <a href="kill_chains.html">Kill Chains</a>
        <a href="cohorts.html">Cohorts</a>
    </nav>

    <div class="container">
        <div class="stat-grid" id="stat-grid">
            <div class="loading">Loading stats...</div>
        </div>

        <div class="two-col">
            <div class="chart-container">
                <h3 class="section-title">Top Threats</h3>
                <canvas id="threats-chart"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="section-title">Alert Severity Distribution</h3>
                <canvas id="severity-chart"></canvas>
            </div>
        </div>

        <h3 class="section-title">Recent Alerts</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Entity</th>
                        <th>Severity</th>
                        <th>Title</th>
                        <th>Drift</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="alerts-body">
                    <tr><td colspan="6" class="loading">Loading alerts...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001/api/v1';

        async function fetchJSON(url) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return resp.json();
        }

        function formatTime(ts) {
            if (!ts) return '—';
            const d = new Date(ts);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        async function loadDashboard() {
            try {
                const [stats, dashboard, alerts] = await Promise.all([
                    fetchJSON(`${API_BASE}/entities/stats`),
                    fetchJSON(`${API_BASE}/detection/dashboard`),
                    fetchJSON(`${API_BASE}/detection/alerts?limit=20`)
                ]);

                renderStats(stats, dashboard);
                renderThreatsChart(dashboard);
                renderSeverityChart(dashboard);
                renderAlerts(alerts);
            } catch (err) {
                document.getElementById('stat-grid').innerHTML =
                    `<div class="error">Failed to load dashboard: ${err.message}. Ensure API is running at ${API_BASE}</div>`;
            }
        }

        function renderStats(stats, dashboard) {
            const grid = document.getElementById('stat-grid');
            const severities = dashboard.alerts_by_severity || {};

            // stats is a list of {entity_type, count, with_embeddings}
            const entityCounts = dashboard.entity_counts || {};
            const entityTotal = Object.values(entityCounts).reduce((a,b) => a + b, 0);

            let html = `
                <div class="stat-card"><div class="value">${entityTotal}</div><div class="label">Total Entities</div></div>
            `;

            // Entity type breakdown from dashboard.entity_counts
            for (const [type, count] of Object.entries(entityCounts)) {
                html += `<div class="stat-card"><div class="value">${count}</div><div class="label">${type}s</div></div>`;
            }

            // Alert severity cards
            html += `<div class="stat-card critical"><div class="value">${severities.critical || 0}</div><div class="label">Critical Alerts</div></div>`;
            html += `<div class="stat-card high"><div class="value">${severities.high || 0}</div><div class="label">High Alerts</div></div>`;
            html += `<div class="stat-card medium"><div class="value">${severities.medium || 0}</div><div class="label">Medium Alerts</div></div>`;

            // Kill chains
            const chains = dashboard.kill_chain_count || dashboard.active_kill_chains || 0;
            html += `<div class="stat-card"><div class="value">${chains}</div><div class="label">Kill Chains</div></div>`;

            grid.innerHTML = html;
        }

        function renderThreatsChart(dashboard) {
            const threats = dashboard.top_threats || [];
            if (!threats.length) return;

            const ctx = document.getElementById('threats-chart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: threats.map(t => t.entity_id || t.entity || t.name || 'Unknown'),
                    datasets: [{
                        label: 'Threat Score',
                        data: threats.map(t => t.score || t.threat_score || t.drift_magnitude || 0),
                        backgroundColor: threats.map(t => {
                            const s = t.severity || 'medium';
                            if (s === 'critical') return 'rgba(239, 68, 68, 0.7)';
                            if (s === 'high') return 'rgba(249, 115, 22, 0.7)';
                            if (s === 'medium') return 'rgba(234, 179, 8, 0.7)';
                            return 'rgba(59, 130, 246, 0.7)';
                        }),
                        borderColor: threats.map(t => {
                            const s = t.severity || 'medium';
                            if (s === 'critical') return '#ef4444';
                            if (s === 'high') return '#f97316';
                            if (s === 'medium') return '#eab308';
                            return '#3b82f6';
                        }),
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#1a5276' }, ticks: { color: '#7f8c9b' } },
                        y: { grid: { display: false }, ticks: { color: '#cbd5e1' } }
                    }
                }
            });
        }

        function renderSeverityChart(dashboard) {
            const severities = dashboard.alerts_by_severity || dashboard.severity_counts || {};
            const ctx = document.getElementById('severity-chart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Critical', 'High', 'Medium', 'Low'],
                    datasets: [{
                        data: [
                            severities.critical || 0,
                            severities.high || 0,
                            severities.medium || 0,
                            severities.low || 0
                        ],
                        backgroundColor: [
                            'rgba(239, 68, 68, 0.8)',
                            'rgba(249, 115, 22, 0.8)',
                            'rgba(234, 179, 8, 0.8)',
                            'rgba(59, 130, 246, 0.8)'
                        ],
                        borderColor: '#16213e',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#cbd5e1' } }
                    }
                }
            });
        }

        function renderAlerts(data) {
            const alerts = Array.isArray(data) ? data : (data.alerts || data.items || []);
            const tbody = document.getElementById('alerts-body');

            if (!alerts.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">No alerts found</td></tr>';
                return;
            }

            tbody.innerHTML = alerts.slice(0, 15).map(a => `
                <tr>
                    <td>${formatTime(a.created_at || a.timestamp)}</td>
                    <td><a class="entity-link" href="entity_detail.html?type=${a.entity_type || 'user'}&id=${a.entity_id}">${a.entity_id || '—'}</a></td>
                    <td><span class="badge badge-${a.severity || 'low'}">${a.severity || 'low'}</span></td>
                    <td>${a.title || a.description || '—'}</td>
                    <td>${a.drift_magnitude != null ? a.drift_magnitude.toFixed(3) : '—'}</td>
                    <td>${a.status || 'open'}</td>
                </tr>
            `).join('');
        }

        loadDashboard();
    </script>
</body>
</html>
